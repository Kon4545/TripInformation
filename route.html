</header>

<div class="page-banner">
  <h1><i class="fa-solid fa-map"></i> <span data-i18n="banner.title.route">全体行程</span></h1>
  <p data-i18n="banner.subtitle.route">3日間の旅程をひと目で確認</p>
</div>

<main><div class="container">

  <!-- 全体行程表 -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-calendar-days"></i> <span data-i18n="route.tableTitle">全体行程表</span></h2>
    <div style="overflow-x:auto">
      <table class="route-table">
        <thead><tr><th style="width:110px" data-i18n="table.time">時刻</th><th data-i18n="table.content">内容</th><th style="width:110px" data-i18n="table.note">備考</th></tr></thead>
        <tbody id="routeTableBody"></tbody>
      </table>
    </div>
  </section>

  <!-- 詳細行程（Day別タブ） -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-list-ol"></i> <span data-i18n="route.detailTitle">詳細行程</span></h2>

    <!-- タブバー -->
    <div style="display:flex;gap:0;border-bottom:2px solid #E8E2D8;margin-bottom:28px">
      <button id="dayTab1" onclick="switchDayTab(1)"
        style="flex:1;padding:13px 8px;border:none;border-bottom:3px solid #ed1b23;margin-bottom:-2px;background:none;cursor:pointer;font-family:inherit;font-size:.92rem;font-weight:700;color:#ed1b23;transition:color .2s,border-color .2s">
        <i class="fa-solid fa-calendar-day" style="margin-right:5px"></i>Day 1
      </button>
      <button id="dayTab2" onclick="switchDayTab(2)"
        style="flex:1;padding:13px 8px;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;cursor:pointer;font-family:inherit;font-size:.92rem;font-weight:700;color:#9A9490;transition:color .2s,border-color .2s">
        <i class="fa-solid fa-calendar-day" style="margin-right:5px"></i>Day 2
      </button>
      <button id="dayTab3" onclick="switchDayTab(3)"
        style="flex:1;padding:13px 8px;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;background:none;cursor:pointer;font-family:inherit;font-size:.92rem;font-weight:700;color:#9A9490;transition:color .2s,border-color .2s">
        <i class="fa-solid fa-calendar-day" style="margin-right:5px"></i>Day 3
      </button>
    </div>

    <!-- Day パネル -->
    <div id="dayPanel1"></div>
    <div id="dayPanel2" style="display:none"></div>
    <div id="dayPanel3" style="display:none"></div>
  </section>

  <!-- ツアーハイライト -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-star"></i> <span data-i18n="highlights.title">ツアーハイライト</span></h2>

  </section>

  <!-- 宿泊施設情報 -->

    <div id="hotelCards"></div>
    <div class="alert alert-info" id="hotelNoteBox" style="margin-top:16px;display:none">
      <i class="fa-solid fa-circle-info"></i>
      <span id="hotelNoteText"></span>
    </div>

</div></main>

<footer class="site-footer">
  <p><i class="fa-solid fa-paper-plane"></i>&ensp;<span id="footerCompany">MOTO TOURS JAPAN株式会社</span></p>

</footer>

<script src="pwa.js"></script>
<script src="i18n.js"></script>
<script src="tour-data.js"></script>
<script>
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
applyI18nStaticText();
mountLangSwitcher('langSwitcherDesktop');
mountLangSwitcher('langSwitcherMobile');
const d = getData();
const BADGE = {red:'badge-red',blue:'badge-blue',green:'badge-green',gold:'badge-gold'};
function badge(text,type){ return text ? `<span class="badge ${BADGE[type]||'badge-blue'}">${esc(text)}</span>` : ''; }

const DAY_COLORS = ['#ed1b23', '#c5151b', '#9e1016'];

// ── 全体行程表 ────────────────────────────────────────────────────
(function buildTable(){
  const days = [d.day1, d.day2, d.day3].filter(Boolean);
  let rows = '';
  days.forEach((day, idx) => {
    const hdr = DAY_COLORS[idx] || '#1A1A1A';
    rows += `<tr class="day-header"><td colspan="3" style="background:${hdr}"><i class="fa-solid fa-calendar-day"></i>&ensp;${esc(day.date)}</td></tr>`;
    (day.items||[]).forEach(item=>{
      const descHtml = item.desc ? `<br><span style="font-size:.82rem;color:var(--text-mid)">${esc(item.desc)}</span>` : '';
      const badgeHtml = badge(item.badge, item.badgeType);
      rows += `<tr>
        <td data-label="${esc(t('table.time'))}"><strong>${esc(item.time||'')}</strong></td>
        <td data-label="${esc(t('table.content'))}"><strong>${esc(item.title||'')}</strong>${descHtml}</td>
        <td data-label="${esc(t('table.note'))}">${badgeHtml}</td>
      </tr>`;
    });
  });
  document.getElementById('routeTableBody').innerHTML = rows;
})();

// ── 詳細行程：共通レンダラー ─────────────────────────────────────
function buildTimeline(items) {
  return (items||[]).map(item=>{
    const bdg = item.badge ? `<span class="badge ${BADGE[item.badgeType]||'badge-blue'}" style="margin-left:8px">${item.badge}</span>` : '';
    return `<div class="tl-item">
      <div class="tl-card">
        <div class="tl-card-header">
          <div class="tl-card-title"><i class="${item.icon||'fa-solid fa-circle'}"></i>${item.title}${bdg}</div>
        </div>
        <div class="tl-card-place"><i class="fa-solid fa-location-dot"></i>${item.place||''}</div>
        <p>${item.desc||''}</p>
      </div>
    </div>`;
  }).join('');
}

function buildRouteIllust(items, dayNum) {
  const STOP_COLORS = ['#ed1b23','#9e1016','#c5151b','#8B3A00','#2D6A4F','#1A3A6B','#0D6A4E','#6B1A1A'];
  if (!items || !items.length) return '';
  const stopsHtml = items.map((item, i) => {
    const color = STOP_COLORS[i % STOP_COLORS.length];
    const isLast = i === items.length - 1;
    const bdg = item.badge ? `<span class="badge badge-${item.badgeType||'blue'}" style="margin-left:6px">${item.badge}</span>` : '';
    return `<div style="display:flex;align-items:flex-start">
      <div style="display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0">
        <div style="width:34px;height:34px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-shrink:0">
          <i class="${item.icon||'fa-solid fa-map-pin'}" style="color:#fff;font-size:.8rem"></i>
        </div>
        ${!isLast ? `<div style="width:2px;flex:1;min-height:28px;background:repeating-linear-gradient(to bottom,#CBD5E1 0,#CBD5E1 5px,transparent 5px,transparent 10px);margin:4px 0"></div>` : ''}
      </div>
      <div style="padding-left:12px;padding-bottom:${isLast?'0':'22px'};padding-top:4px;flex:1;min-width:0">
        <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:2px">
          <span style="width:18px;height:18px;border-radius:50%;background:${color};color:#fff;font-size:.6rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</span>
          <span style="font-weight:700;color:#1A1A2E;font-size:.93rem;line-height:1.4">${item.title}</span>${bdg}
        </div>
        ${item.place ? `<div style="font-size:.78rem;color:#7A7068;display:flex;align-items:center;gap:3px;margin-bottom:3px"><i class="fa-solid fa-location-dot" style="color:#ed1b23;font-size:.68rem;flex-shrink:0"></i>${item.place}</div>` : ''}
        ${item.desc ? `<div style="font-size:.8rem;color:#5A5650;line-height:1.55">${item.desc}</div>` : ''}
      </div>
    </div>`;
  }).join('');
  return `
    <div style="background:#fff;border:1px solid #E8E2D8;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)">
      <div style="background:linear-gradient(135deg,#1A1A2E 0%,#2C3E6B 100%);padding:14px 20px;display:flex;align-items:center;gap:12px">
        <div style="width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="fa-solid fa-route" style="color:#fff;font-size:1.1rem"></i>
        </div>
        <div>
          <div style="color:#fff;font-weight:700;font-size:.92rem;letter-spacing:.03em">Day ${dayNum} ${esc(t('route.detailMap'))}</div>
          <div style="color:rgba(255,255,255,.55);font-size:.73rem;margin-top:1px">${items.length} ${esc(t('route.spots'))}</div>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
          <div style="width:8px;height:8px;border-radius:50%;background:#ed1b23"></div>
          <div style="width:28px;height:2px;background:rgba(255,255,255,.25);border-radius:2px"></div>
          <i class="fa-solid fa-car" style="color:rgba(255,255,255,.5);font-size:.8rem"></i>
          <div style="width:28px;height:2px;background:rgba(255,255,255,.25);border-radius:2px"></div>
          <div style="width:8px;height:8px;border-radius:50%;background:#2D6A4F"></div>
        </div>
      </div>
      <div style="padding:20px 20px 16px">${stopsHtml}</div>
    </div>`;
}

// ── 各 Day パネルを構築 ──────────────────────────────────────────
const DAY_DEFS = [
  {
    key: 'day1', num: 1,
    gradient: 'linear-gradient(135deg,#ed1b23,#9e1016)',
    icon: 'fa-solid fa-torii-gate',
    metaFn: () => [
      `<span class="day-strip-meta-item"><i class="fa-solid fa-calendar"></i>${esc(d.day1.date)}</span>`,
      `<span class="day-strip-meta-item"><i class="fa-solid fa-location-dot"></i>${esc(d.meeting.place)}</span>`,
      `<span class="day-strip-meta-item"><i class="fa-solid fa-hotel"></i>${esc((d.hotels&&d.hotels[0])?d.hotels[0].name:d.hotel?d.hotel.name:'')} ${esc(t('day.night'))}</span>`
    ].join('')
  },
  {
    key: 'day2', num: 2,
    gradient: 'linear-gradient(135deg,#c5151b,#9e1016)',
    icon: 'fa-solid fa-utensils',
    metaFn: () => [
      `<span class="day-strip-meta-item"><i class="fa-solid fa-calendar"></i>${esc(d.day2.date)}</span>`,
      `<span class="day-strip-meta-item"><i class="fa-solid fa-hotel"></i>${esc((d.hotels&&d.hotels[0])?d.hotels[0].name:d.hotel?d.hotel.name:'')} ${esc(t('day.depart'))}</span>`,
      `<span class="day-strip-meta-item"><i class="fa-solid fa-flag-checkered"></i>${esc(d.meeting.endTime)} ${esc(t('day.dismiss'))}</span>`
    ].join('')
  },
  {
    key: 'day3', num: 3,
    gradient: 'linear-gradient(135deg,#9e1016,#7a0d12)',
    icon: 'fa-solid fa-paw',
    metaFn: () => [
      `<span class="day-strip-meta-item"><i class="fa-solid fa-calendar"></i>${esc(d.day3.date)}</span>`,
      `<span class="day-strip-meta-item"><i class="fa-solid fa-hotel"></i>${esc((d.hotels&&d.hotels[1])?d.hotels[1].name:'')} ${esc(t('day.depart'))}</span>`,
      `<span class="day-strip-meta-item"><i class="fa-solid fa-flag-checkered"></i>${esc(d.meeting.endTime)} ${esc(t('day.dismiss'))}</span>`
    ].join('')
  }
];

// ── 距離・標高プロファイル ─────────────────────────────────────
function buildElevationSection(items, num){
  const pts = [];
  let cumKm = 0;
  (items||[]).forEach(item => {
    cumKm += Number(item.distanceFromPrev) || 0;
    if (item.elevation !== null && item.elevation !== undefined && item.elevation !== '') {
      pts.push({km: cumKm, m: Number(item.elevation), name: item.title || ''});
    }
  });
  if (pts.length < 2) return '';
  const totalKm = Math.round(cumKm * 10) / 10;
  const maxElevation = Math.max(...pts.map(p => p.m));
  let ascent = 0;
  for (let i = 1; i < pts.length; i++) {
    const diff = pts[i].m - pts[i-1].m;
    if (diff > 0) ascent += diff;
  }
  return `
    <h3 class="section-title" style="font-size:1rem;margin-top:28px;margin-bottom:12px">
      <i class="fa-solid fa-chart-area"></i> ${esc(t('route.elevationTitle'))}
    </h3>
    <div style="background:#F5F3EF;border-radius:16px;padding:20px" data-elev-pts='${esc(JSON.stringify(pts))}' id="elevBlock${num}">
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px">
        <div style="background:#fff;border-radius:10px;padding:12px 14px">
          <div style="font-size:.68rem;color:#8A8478;margin-bottom:4px">${esc(t('route.totalDistance'))}</div>
          <div style="font-size:1.15rem;font-weight:700;color:#1A1A2E">${totalKm}<span style="font-size:.7rem;font-weight:400;color:#8A8478"> km</span></div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:12px 14px">
          <div style="font-size:.68rem;color:#8A8478;margin-bottom:4px">${esc(t('route.totalAscent'))}</div>
          <div style="font-size:1.15rem;font-weight:700;color:#1A1A2E">${Math.round(ascent)}<span style="font-size:.7rem;font-weight:400;color:#8A8478"> m</span></div>
        </div>
        <div style="background:#fff;border-radius:10px;padding:12px 14px">
          <div style="font-size:.68rem;color:#8A8478;margin-bottom:4px">${esc(t('route.maxElevation'))}</div>
          <div style="font-size:1.15rem;font-weight:700;color:#1A1A2E">${Math.round(maxElevation)}<span style="font-size:.7rem;font-weight:400;color:#8A8478"> m</span></div>
        </div>
      </div>
      <div style="position:relative;width:100%;height:220px">
        <canvas id="elevChart${num}"></canvas>
      </div>
    </div>`;
}
function renderElevationCharts(){
  const blocks = document.querySelectorAll('[data-elev-pts]');
  if (!blocks.length) return;
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js';
  script.onload = () => {
    blocks.forEach(block => {
      const pts = JSON.parse(block.dataset.elevPts);
      const num = block.id.replace('elevBlock', '');
      new Chart(document.getElementById('elevChart' + num), {
        type: 'line',
        data: {
          labels: pts.map(p => Math.round(p.km * 10) / 10 + 'km'),
          datasets: [{
            data: pts.map(p => p.m),
            borderColor: '#ed1b23',
            backgroundColor: 'rgba(237,27,35,0.1)',
            pointBackgroundColor: '#ed1b23',
            pointBorderColor: '#F5F3EF',
            pointBorderWidth: 2,
            pointRadius: 5,
            borderWidth: 2,
            fill: true,
            tension: 0.35
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { autoSkip: false, maxRotation: 0, color: '#8A8478', font: { size: 11 } }, grid: { display: false } },
            y: { ticks: { color: '#8A8478', font: { size: 11 } }, grid: { color: '#E8E2D8' } }
          }
        }
      });
    });
  };
  document.head.appendChild(script);
}

DAY_DEFS.forEach(({key, num, gradient, icon, metaFn}) => {
  const day = d[key];
  if (!day) return;
  const panel = document.getElementById('dayPanel' + num);
  panel.innerHTML =
    `<div class="day-strip" style="background:${gradient}">
      <h2><i class="${icon}"></i> Day ${num} — ${esc(day.theme)}</h2>
      <div class="day-strip-meta">${metaFn()}</div>
    </div>` +
    `<h3 class="section-title" style="font-size:1rem;margin-top:24px;margin-bottom:12px">
      <i class="fa-solid fa-list-ol"></i> ${esc(t('route.detailTimeline'))}
    </h3>
    <div class="timeline">${buildTimeline(day.items)}</div>` +
    `<h3 class="section-title" style="font-size:1rem;margin-top:28px;margin-bottom:12px">
      <i class="fa-solid fa-map-location-dot"></i> Day ${num} ${esc(t('route.detailMap'))}
    </h3>
    ${buildRouteIllust(day.items, num)}` +
    buildElevationSection(day.items, num);
});
renderElevationCharts();

// ── タブ切替 ───────────────────────────────────────────────────
function switchDayTab(n) {
  [1,2,3].forEach(i => {
    const isActive = (i === n);
    const tab = document.getElementById('dayTab' + i);
    tab.style.color       = isActive ? '#ed1b23' : '#9A9490';
    tab.style.borderColor = isActive ? '#ed1b23' : 'transparent';
    document.getElementById('dayPanel' + i).style.display = isActive ? '' : 'none';
  });
  history.replaceState(null, '', '#day' + n);
}

// ページ読み込み時にハッシュで初期タブを決定
(function(){
  const h = location.hash;
  if      (h === '#day2') switchDayTab(2);
  else if (h === '#day3') switchDayTab(3);
  // デフォルトは Day 1（既にアクティブ）
})();

// ── ツアーハイライト ─────────────────────────────────────────────
document.getElementById('highlightsGrid').innerHTML = (d.highlights||[]).map(h => {
  const color = h.color || '#9e1016';
  return `
<div class="hl-card">
  <div class="hl-card-img" style="background:linear-gradient(145deg,${esc(color)},${esc(color)}bb);position:relative;overflow:hidden">
    <div style="position:absolute;top:-24px;right:-24px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.08)"></div>
    <div style="position:absolute;bottom:-18px;left:-18px;width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.06)"></div>
    <div style="position:relative;z-index:1;width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.22);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(0,0,0,.18)">
      <i class="${esc(h.icon)}" style="font-size:1.8rem;color:#fff"></i>
    </div>
  </div>
  <div class="hl-card-body"><h3>${esc(h.title)}</h3><p>${esc(h.desc)}</p></div>
</div>`;
}).join('');

// ── 宿泊施設情報 ─────────────────────────────────────────────────
const hotels = d.hotels || (d.hotel ? [d.hotel] : []);
document.getElementById('hotelCards').innerHTML = hotels.map((h,i) => {
  const nightText = (h.night || '').replace(/（[^）]*）/g,'').replace(/\([^)]*\)/g,'').trim();
  const nightLabel = nightText
    ? `<div style="display:inline-block;background:var(--gold);color:#fff;font-size:.72rem;font-weight:700;padding:3px 12px;border-radius:99px;margin-bottom:12px;letter-spacing:.06em">${esc(nightText)}</div>`
    : '';
  const imgHtml = h.image
    ? `<div class="hotel-card-img" style="padding:0;overflow:hidden"><img src="${h.image}" style="width:100%;height:100%;object-fit:cover;display:block"></div>`
    : `<div class="hotel-card-img"><i class="fa-solid fa-hotel"></i></div>`;
  const amenitiesHtml = (h.amenities && h.amenities.length)
    ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:14px">
        ${h.amenities.map(a => `<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:#F5F3EF;border:1px solid #E8E2D8;border-radius:99px;font-size:.76rem;color:#5A5650"><i class="fa-solid fa-check" style="color:#2D6A4F;font-size:.68rem"></i>${esc(a)}</span>`).join('')}
      </div>`
    : '';
  return `<div class="hotel-card" style="${i > 0 ? 'margin-top:20px' : ''}">
    ${imgHtml}
    <div class="hotel-card-body">
      ${nightLabel}
      <h3>${esc(h.name)}</h3>
      <div class="hotel-meta">
        ${h.address ? `<div class="hotel-meta-item"><i class="fa-solid fa-location-dot"></i>${esc(h.address)}</div>` : ''}
        ${h.phone   ? `<div class="hotel-meta-item"><i class="fa-solid fa-phone"></i>${esc(h.phone)}</div>` : ''}
        ${h.checkin ? `<div class="hotel-meta-item"><i class="fa-solid fa-right-to-bracket"></i>${esc(t('hotel.checkin'))}${esc(h.checkin)}</div>` : ''}
        ${h.checkout? `<div class="hotel-meta-item"><i class="fa-solid fa-right-from-bracket"></i>${esc(t('hotel.checkout'))}${esc(h.checkout)}</div>` : ''}
      </div>
      ${h.desc ? `<p class="desc">${esc(h.desc)}</p>` : ''}
      ${amenitiesHtml}
      ${h.url ? `<a href="${h.url}" target="_blank" rel="noopener noreferrer" class="hotel-official-btn"><i class="fa-solid fa-arrow-up-right-from-square"></i>&ensp;${esc(t('hotel.officialSite'))}</a>` : ''}
    </div>
  </div>`;
}).join('');

// Hotel note
(function(){
  const note = d.hotelNote || '';
  const box  = document.getElementById('hotelNoteBox');
  const txt  = document.getElementById('hotelNoteText');
  if(note && box && txt){ txt.textContent = note; box.style.display = ''; }
})();

document.getElementById('footerCompany').textContent = d.company.name;
document.getElementById('footerCopy').innerHTML = '&copy; 2026 ' + d.company.nameEn + '. All Rights Reserved.';
document.getElementById('hamburger').addEventListener('click',function(){ this.classList.toggle('open'); document.getElementById('mobileNav').classList.toggle('open'); });
</script>
</body>
</html>
