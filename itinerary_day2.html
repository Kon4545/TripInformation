<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Day 2 詳細行程 | 旅のしおり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9e1016">
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo"><i class="fa-solid fa-paper-plane"></i><span>MOTO TOURS JAPAN株式会社</span></a>
    <nav class="nav-menu">
      <a href="index.html" data-i18n="nav.home">ホーム</a>
      <a href="route.html" class="active" data-i18n="nav.route">全体行程</a>
      <a href="caution.html" data-i18n="nav.caution">注意事項</a>
      <a href="company_information.html" data-i18n="nav.company">会社情報</a>
      <a href="post_tour.html" data-i18n="nav.postTour">ツアー後</a>
    </nav>
    <div id="langSwitcherDesktop"></div>
    <img src="MTJ_logo_color_RGB.jpg" alt="MOTO TOURS JAPAN" class="header-logo-img">
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <nav class="mobile-nav" id="mobileNav">
    <a href="index.html"><i class="fa-solid fa-house"></i>&ensp;<span data-i18n="nav.home.mobile">ホーム</span></a>
    <a href="route.html" class="active"><i class="fa-solid fa-map"></i>&ensp;<span data-i18n="nav.route.mobile">全体行程</span></a>
    <a href="caution.html"><i class="fa-solid fa-circle-exclamation"></i>&ensp;<span data-i18n="nav.caution.mobile">注意事項</span></a>
    <a href="company_information.html"><i class="fa-solid fa-building"></i>&ensp;<span data-i18n="nav.company.mobile">会社情報</span></a>
    <a href="post_tour.html"><i class="fa-solid fa-camera-retro"></i>&ensp;<span data-i18n="nav.postTour.mobile">ツアー後</span></a>
    <div id="langSwitcherMobile"></div>
  </nav>
</header>

<div class="page-banner" style="background:linear-gradient(135deg,#ed1b23,#9e1016)">
  <h1><i class="fa-solid fa-utensils"></i> Day 2 <span data-i18n="route.detailTitle">詳細行程</span></h1>
  <p id="bannerSub">—</p>
</div>

<main><div class="container">
  <section class="section">
    <div class="day-strip" id="dayStrip"></div>
    <h2 class="section-title"><i class="fa-solid fa-list-ol"></i> <span data-i18n="route.detailTimeline">詳細タイムライン</span></h2>
    <div class="timeline" id="timeline"></div>
  </section>

  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-map-location-dot"></i> Day 2 <span data-i18n="route.detailMap">訪問スポット マップ</span></h2>
    <div id="routeIllust"></div>
  </section>

  <div class="page-nav">
    <a href="itinerary_day1.html" class="btn-nav btn-nav-prev"><i class="fa-solid fa-arrow-left"></i> Day 1 <span data-i18n="pagenav.dayDetail">詳細へ</span></a>
    <a href="itinerary_day3.html" class="btn-nav btn-nav-next">Day 3 <span data-i18n="pagenav.dayDetail">詳細へ</span> <i class="fa-solid fa-arrow-right"></i></a>
  </div>
</div></main>

<footer class="site-footer">
  <p><i class="fa-solid fa-paper-plane"></i>&ensp;<span id="footerCompany">MOTO TOURS JAPAN株式会社</span></p>
  <p id="footerCopy">&copy; 2026 MOTO TOURS JAPAN Co., Ltd. All Rights Reserved.</p>
</footer>

<script src="pwa.js"></script>
<script src="i18n.js"></script>
<script src="tour-data.js"></script>
<script>
applyI18nStaticText();
mountLangSwitcher('langSwitcherDesktop');
mountLangSwitcher('langSwitcherMobile');
document.title = 'Day 2 ' + t('route.detailTitle') + ' | ' + t('title.index');
const d = getData();
const day = d.day2;
const BADGE = {red:'badge-red',blue:'badge-blue',green:'badge-green',gold:'badge-gold'};

document.getElementById('bannerSub').textContent = day.date + '｜' + day.theme;
document.getElementById('dayStrip').innerHTML = `
  <h2><i class="fa-solid fa-calendar-day"></i> Day 2 — ${day.theme}</h2>
  <div class="day-strip-meta">
    <span class="day-strip-meta-item"><i class="fa-solid fa-calendar"></i>${day.date}</span>
    <span class="day-strip-meta-item"><i class="fa-solid fa-hotel"></i>${(d.hotels && d.hotels[0]) ? d.hotels[0].name : d.hotel ? d.hotel.name : ''} ${t('day.depart')}</span>
    <span class="day-strip-meta-item"><i class="fa-solid fa-flag-checkered"></i>${d.meeting.endTime} ${t('day.dismiss')}</span>
  </div>`;
document.getElementById('dayStrip').style.background = 'linear-gradient(135deg,#c5151b,#9e1016)';

document.getElementById('timeline').innerHTML = (day.items||[]).map(item=>{
  const bdg = item.badge ? `<span class="badge ${BADGE[item.badgeType]||'badge-blue'}" style="margin-left:8px">${item.badge}</span>` : '';
  return `<div class="tl-item">
    <div class="tl-card">
      <div class="tl-card-header">
        <div class="tl-card-title"><i class="${item.icon||'fa-solid fa-circle'}"></i>${item.title}${bdg}</div>
      </div>
      <div class="tl-card-place"><i class="fa-solid fa-location-dot"></i>${item.place||''}</div>
      <p>${item.desc||''}</p>
    </div>
  </div>`;
}).join('');

// Route Illustration
(function(){
  const items = day.items || [];
  const STOP_COLORS = ['#ed1b23','#9e1016','#c5151b','#8B3A00','#2D6A4F','#1A3A6B','#0D6A4E','#6B1A1A'];
  const el = document.getElementById('routeIllust');
  if (!el || !items.length) return;
  const stopsHtml = items.map((item, i) => {
    const color = STOP_COLORS[i % STOP_COLORS.length];
    const isLast = i === items.length - 1;
    const bdg = item.badge ? `<span class="badge badge-${item.badgeType||'blue'}" style="margin-left:6px">${item.badge}</span>` : '';
    return `<div style="display:flex;align-items:flex-start">
        <div style="display:flex;flex-direction:column;align-items:center;width:40px;flex-shrink:0">
          <div style="width:34px;height:34px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.2);flex-shrink:0">
            <i class="${item.icon||'fa-solid fa-map-pin'}" style="color:#fff;font-size:.8rem"></i>
          </div>
          ${!isLast ? `<div style="width:2px;flex:1;min-height:28px;background:repeating-linear-gradient(to bottom,#CBD5E1 0,#CBD5E1 5px,transparent 5px,transparent 10px);margin:4px 0"></div>` : ''}
        </div>
        <div style="padding-left:12px;padding-bottom:${isLast?'0':'22px'};padding-top:4px;flex:1;min-width:0">
          <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:2px">
            <span style="width:18px;height:18px;border-radius:50%;background:${color};color:#fff;font-size:.6rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0">${i+1}</span>
            <span style="font-weight:700;color:#1A1A2E;font-size:.93rem;line-height:1.4">${item.title}</span>${bdg}
          </div>
          ${item.place ? `<div style="font-size:.78rem;color:#7A7068;display:flex;align-items:center;gap:3px;margin-bottom:3px"><i class="fa-solid fa-location-dot" style="color:#ed1b23;font-size:.68rem;flex-shrink:0"></i>${item.place}</div>` : ''}
          ${item.desc ? `<div style="font-size:.8rem;color:#5A5650;line-height:1.55">${item.desc}</div>` : ''}
        </div>
      </div>`;
  }).join('');
  el.innerHTML = `
    <div style="background:#fff;border:1px solid #E8E2D8;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.06)">
      <div style="background:linear-gradient(135deg,#1A1A2E 0%,#2C3E6B 100%);padding:14px 20px;display:flex;align-items:center;gap:12px">
        <div style="width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i class="fa-solid fa-route" style="color:#fff;font-size:1.1rem"></i>
        </div>
        <div>
          <div style="color:#fff;font-weight:700;font-size:.92rem;letter-spacing:.03em">Day 2 ${t('route.detailMap')}</div>
          <div style="color:rgba(255,255,255,.55);font-size:.73rem;margin-top:1px">${items.length} ${t('route.spots')}</div>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center;gap:6px">
          <div style="width:8px;height:8px;border-radius:50%;background:#ed1b23"></div>
          <div style="width:28px;height:2px;background:rgba(255,255,255,.25);border-radius:2px"></div>
          <i class="fa-solid fa-car" style="color:rgba(255,255,255,.5);font-size:.8rem"></i>
          <div style="width:28px;height:2px;background:rgba(255,255,255,.25);border-radius:2px"></div>
          <div style="width:8px;height:8px;border-radius:50%;background:#2D6A4F"></div>
        </div>
      </div>
      <div style="padding:20px 20px 16px">
        ${stopsHtml}
      </div>
    </div>`;
})();

document.getElementById('footerCompany').textContent = d.company.name;
document.getElementById('footerCopy').innerHTML = '&copy; 2026 ' + d.company.nameEn + '. All Rights Reserved.';
document.getElementById('hamburger').addEventListener('click',function(){ this.classList.toggle('open'); document.getElementById('mobileNav').classList.toggle('open'); });
</script>
</body>
</html>
