  <nav class="mobile-nav" id="mobileNav">

    <a href="post_tour.html"><i class="fa-solid fa-camera-retro"></i>&ensp;<span data-i18n="nav.postTour.mobile">ツアー後</span></a>

</header>

<!-- Hero -->
<section class="hero" id="heroSection">
  <div class="hero-bg-parallax" id="heroBgParallax"><div class="hero-bg-layer" id="heroBgLayer"></div></div>
  <div class="hero-bg-overlay"></div>
  <div class="hero-eyebrow"><i class="fa-solid fa-paper-plane"></i> <span data-i18n="hero.eyebrow">旅のしおり</span></div>
  <h1 id="heroTitle">—</h1>
  <p class="hero-sub" id="heroSub">—</p>
  <div class="hero-chips" id="heroChips"></div>
  <div id="countdownBadge"></div>
</section>

<main>
<div class="container">

  <div style="display:flex;gap:12px;flex-wrap:wrap;margin:18px 0 28px">
    <a href="flipbook.html" style="flex:1;min-width:220px;display:flex;align-items:center;justify-content:center;gap:10px;background:linear-gradient(135deg,#1A1A2E,#2C3E6B);color:#fff;text-decoration:none;padding:14px 20px;border-radius:12px;font-weight:700;font-size:.92rem;box-shadow:0 4px 16px rgba(0,0,0,.15)">
      <i class="fa-solid fa-book-open"></i> <span data-i18n="flipbook.cta">フリップブックで読む（ページをめくって閲覧）</span>
    </a>
    <a href="print.html" style="flex:1;min-width:220px;display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:var(--navy-dark);border:1.5px solid var(--navy-dark);text-decoration:none;padding:14px 20px;border-radius:12px;font-weight:700;font-size:.92rem">
      <i class="fa-solid fa-file-pdf"></i> <span data-i18n="print.cta">しおりをPDFで保存する</span>
    </a>
  </div>

  <!-- Greeting（最初に表示） -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-envelope-open-text"></i> <span data-i18n="section.greeting">担当添乗員からのご挨拶</span></h2>
    <div class="greeting-box" id="greetingBox"></div>
  </section>

  <!-- Meeting info -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-clock"></i> <span data-i18n="section.meetingInfo">集合・解散情報</span></h2>
    <!-- 天気予報 -->
    <div id="weatherBlock"></div>
    <!-- マップを最初に表示 -->
    <div class="meeting-maps" id="meetingMaps"></div>
    <!-- 集合・解散カード -->
    <div class="grid grid-3" id="meetingCards"></div>
    <!-- 送迎 -->
    <div id="shuttleBlock"></div>
  </section>

  <!-- Includes / Excludes -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-list-check"></i> <span data-i18n="section.includeExclude">含まれるもの・含まれないもの</span></h2>
    <div class="include-grid">
      <div class="include-box yes">
        <div class="include-box-header"><i class="fa-solid fa-circle-check"></i> <span data-i18n="include.included">含まれるもの</span></div>
        <div id="includesList"></div>
      </div>
      <div class="include-box no">
        <div class="include-box-header"><i class="fa-solid fa-circle-xmark"></i> <span data-i18n="include.excluded">含まれないもの</span></div>
        <div id="excludesList"></div>
      </div>
    </div>
  </section>

  <!-- Quick links -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-compass"></i> <span data-i18n="quicklinks.title">しおりのコンテンツ</span></h2>
    <div class="grid grid-3" id="quickLinksGrid"></div>
  </section>

  <!-- FAQ -->
  <section class="section" id="faqSection" style="display:none">
    <h2 class="section-title"><i class="fa-solid fa-circle-question"></i> <span data-i18n="faq.title">よくある質問</span></h2>
    <div id="faqList"></div>
  </section>

</div>
</main>

<footer class="site-footer">
  <p><i class="fa-solid fa-paper-plane"></i>&ensp;<span id="footerCompany">MOTO TOURS JAPAN株式会社</span></p>
  <p id="footerCopy">&copy; 2026 MOTO TOURS JAPAN Co., Ltd. All Rights Reserved.</p>
</footer>

<script src="pwa.js"></script>
<script src="i18n.js"></script>
<script src="tour-data.js"></script>
<script>
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
applyI18nStaticText();
mountLangSwitcher('langSwitcherDesktop');
mountLangSwitcher('langSwitcherMobile');
const d = getData();
// Page title
document.getElementById('pageTitle').textContent = t('title.index') + ' | ' + d.basic.tourTitle;
document.getElementById('hCompanyName').textContent = d.company.name.toUpperCase() || 'MOTO TOURS JAPAN株式会社';
// Hero
document.getElementById('heroTitle').innerHTML = d.basic.tourTitle.replace('・','<span style="color:var(--white)">・</span>');
// Hero background（動画が設定されていれば動画、なければ画像。ズーム演出＋スクロール連動のパララックス付き）
if (d.basic.heroVideoUrl || d.basic.heroBgImage) {
  const hero = document.getElementById('heroSection');
  const bgLayer = document.getElementById('heroBgLayer');
  if (d.basic.heroVideoUrl) {
    bgLayer.innerHTML = `<video autoplay muted loop playsinline src="${esc(d.basic.heroVideoUrl)}"></video>`;
  } else {
    bgLayer.style.backgroundImage = 'url("' + d.basic.heroBgImage + '")';
  }
  hero.classList.add('has-bg-img');

  // スクロール連動パララックス（動きを抑えたい設定の場合やスマホでは無効化）
  const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!prefersReducedMotion && window.innerWidth > 768) {
    const parallaxLayer = document.getElementById('heroBgParallax');
    let ticking = false;
    window.addEventListener('scroll', function(){
      if (ticking) return;
      ticking = true;
      requestAnimationFrame(function(){
        const offset = Math.min(window.scrollY, hero.offsetHeight);
        parallaxLayer.style.transform = 'translateY(' + (offset * 0.35) + 'px)';
        ticking = false;
      });
    }, { passive: true });
  }
}
document.getElementById('heroSub').textContent = d.basic.tourSubtitle;
document.getElementById('heroChips').innerHTML = [
  ['fa-solid fa-calendar', d.basic.tourDates],
  ['fa-solid fa-users', d.basic.participantCount],
  ['fa-solid fa-location-dot', d.basic.area]
].map(([ico,txt])=>`<span class="hero-chip"><i class="${ico}"></i>${txt}</span>`).join('');

// 出発日カウントダウン（管理画面で集合日を設定している場合のみ表示）
(function(){
  const iso = d.meeting && d.meeting.meetDateISO;
  if (!iso) return;
  const meetDate = new Date(iso + 'T00:00:00');
  if (isNaN(meetDate.getTime())) return;
  const endIso = d.meeting.tourEndDateISO || iso;
  const endDate = new Date(endIso + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((meetDate - today) / 86400000);

  let html, tier, icon;
  if (diffDays > 7) {
    tier = 'far';    icon = 'fa-hourglass-half';
    html = t('countdown.days').replace('{n}', diffDays);
  } else if (diffDays > 1) {
    tier = 'week';    icon = 'fa-champagne-glasses';
    html = t('countdown.week').replace('{n}', diffDays);
  } else if (diffDays === 1) {
    tier = 'tomorrow'; icon = 'fa-flag-checkered';
    html = esc(t('countdown.tomorrow'));
  } else if (diffDays === 0) {
    tier = 'today';    icon = 'fa-motorcycle';
    html = esc(t('countdown.today'));
  } else if (!isNaN(endDate.getTime()) && today <= endDate) {
    tier = 'ongoing';  icon = 'fa-route';
    html = esc(t('countdown.ongoing'));
  } else {
    tier = 'done';     icon = 'fa-circle-check';
    html = esc(t('countdown.done'));
  }
  document.getElementById('countdownBadge').innerHTML =
    `<div class="countdown-badge tier-${tier}">
      <i class="fa-solid ${icon}"></i> ${html}
    </div>`;
})();

// 天気予報（管理画面で緯度・経度・集合日を設定している場合のみ表示。Open-Meteo：APIキー不要・CORS対応の無料API）
(function(){
  const lat = parseFloat(d.meeting && d.meeting.meetLat);
  const lng = parseFloat(d.meeting && d.meeting.meetLng);
  const iso = d.meeting && d.meeting.meetDateISO;
  if (!iso || isNaN(lat) || isNaN(lng)) return;

  const today = new Date(); today.setHours(0,0,0,0);
  const meetDate = new Date(iso + 'T00:00:00');
  if (isNaN(meetDate.getTime())) return;
  const endIso = d.meeting.tourEndDateISO || iso;
  let endDate = new Date(endIso + 'T00:00:00');
  if (isNaN(endDate.getTime()) || endDate < meetDate) endDate = meetDate;

  // Open-Meteo の無料予報は最大16日先まで。範囲外なら「もうすぐ表示」の案内だけ出す
  const maxForecastDate = new Date(today.getTime() + 16 * 86400000);
  if (meetDate > maxForecastDate) {
    document.getElementById('weatherBlock').innerHTML = `
      <div class="weather-block" style="background:#EFF3FA;border:1px solid #C7D3E8;border-radius:12px;padding:16px 20px;margin-bottom:20px;font-size:.85rem;color:#5A5650;display:flex;align-items:center;gap:10px">
        <i class="fa-solid fa-cloud" style="color:#2C3E6B"></i> ${esc(t('weather.unavailable'))}
      </div>`;
    return;
  }
  if (endDate < today) return; // ツアーは既に終了している

  const startFetch = meetDate < today ? today : meetDate;
  const startStr = startFetch.toISOString().slice(0,10);
  const endStr   = endDate.toISOString().slice(0,10);

  document.getElementById('weatherBlock').innerHTML = `
    <div class="weather-block" id="weatherBlockInner" style="background:#EFF3FA;border:1px solid #C7D3E8;border-radius:12px;padding:18px 20px;margin-bottom:20px">
      <div style="font-size:.78rem;font-weight:700;color:#2C3E6B;letter-spacing:.06em;margin-bottom:10px"><i class="fa-solid fa-cloud-sun"></i>&ensp;${esc(t('weather.title'))}</div>
      <div style="font-size:.85rem;color:#5A5650">${esc(t('weather.loading'))}</div>
    </div>`;

  const WMO_ICON = {
    0:['fa-sun','#F5A623'], 1:['fa-cloud-sun','#F5A623'], 2:['fa-cloud-sun','#8A8478'], 3:['fa-cloud','#8A8478'],
    45:['fa-smog','#8A8478'], 48:['fa-smog','#8A8478'],
    51:['fa-cloud-rain','#4A90D9'], 53:['fa-cloud-rain','#4A90D9'], 55:['fa-cloud-rain','#4A90D9'],
    61:['fa-cloud-showers-heavy','#4A90D9'], 63:['fa-cloud-showers-heavy','#4A90D9'], 65:['fa-cloud-showers-heavy','#1A5FA8'],
    71:['fa-snowflake','#7FB3E8'], 73:['fa-snowflake','#7FB3E8'], 75:['fa-snowflake','#4A90D9'],
    80:['fa-cloud-showers-heavy','#4A90D9'], 81:['fa-cloud-showers-heavy','#4A90D9'], 82:['fa-cloud-showers-heavy','#1A5FA8'],
    95:['fa-cloud-bolt','#9e1016'], 96:['fa-cloud-bolt','#9e1016'], 99:['fa-cloud-bolt','#9e1016']
  };
  const WEEKDAY = { ja:['日','月','火','水','木','金','土'], en:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], zh:['日','一','二','三','四','五','六'] };

  const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + lat + '&longitude=' + lng +
    '&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo' +
    '&start_date=' + startStr + '&end_date=' + endStr;

  fetch(url).then(r => { if (!r.ok) throw new Error('http ' + r.status); return r.json(); }).then(data => {
    const daily = data && data.daily;
    if (!daily || !daily.time || !daily.time.length) throw new Error('empty forecast');
    const lang = getCurrentLang();
    const cardsHtml = daily.time.map((dateStr, i) => {
      const wc = daily.weathercode[i];
      const [icon, color] = WMO_ICON[wc] || ['fa-cloud', '#8A8478'];
      const dt = new Date(dateStr + 'T00:00:00');
      const wLabel = (WEEKDAY[lang] || WEEKDAY.ja)[dt.getDay()];
      const md = (dt.getMonth() + 1) + '/' + dt.getDate();
      return `<div style="background:#fff;border-radius:10px;padding:12px 10px;text-align:center;min-width:76px;flex:1">
        <div style="font-size:.72rem;color:#8A8478;font-weight:700">${md} (${wLabel})</div>
        <i class="fa-solid ${icon}" style="color:${color};font-size:1.4rem;margin:6px 0;display:block"></i>
        <div style="font-size:.82rem;font-weight:700;color:#1A1A2E">${Math.round(daily.temperature_2m_max[i])}°<span style="color:#8A8478;font-weight:500">/${Math.round(daily.temperature_2m_min[i])}°</span></div>
      </div>`;
    }).join('');
    document.getElementById('weatherBlockInner').innerHTML = `
      <div style="font-size:.78rem;font-weight:700;color:#2C3E6B;letter-spacing:.06em;margin-bottom:10px"><i class="fa-solid fa-cloud-sun"></i>&ensp;${esc(t('weather.title'))}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">${cardsHtml}</div>`;
  }).catch(() => {
    const el = document.getElementById('weatherBlockInner');
    if (el) el.innerHTML = `
      <div style="font-size:.78rem;font-weight:700;color:#2C3E6B;letter-spacing:.06em;margin-bottom:10px"><i class="fa-solid fa-cloud-sun"></i>&ensp;${esc(t('weather.title'))}</div>
      <div style="font-size:.85rem;color:#9B1B1B"><i class="fa-solid fa-triangle-exclamation"></i> ${esc(t('weather.error'))}</div>`;
  });
})();

// 担当添乗員からのご挨拶（複数担当者対応）
const guides = (d.guides && d.guides.length) ? d.guides : (d.guide ? [d.guide] : []);
const primaryGuide = guides[0] || {};
document.getElementById('greetingBox').innerHTML =
  '<div class="greeting-from">' +
  guides.map(g => `
    <div class="greeting-from-item">
      <div class="greeting-avatar"><i class="fa-solid fa-circle-user"></i></div>
      <div>
        <div class="greeting-from-name">${esc(g.name)}</div>
        <div class="greeting-from-title">${esc(g.title)}</div>
      </div>
    </div>`).join('') +
  '</div>' +
  `<div class="greeting-text">${esc(primaryGuide.greeting || '')}</div>` +
  `<div class="greeting-sign">${esc(d.company.name)}　${esc(t('greeting.signedBy'))} ${guides.map(g => g.name.split('（')[0]).join(' / ')}</div>`;

// Meeting cards
const mc = [
  {icon: d.meeting.meetIcon || 'fa-solid fa-flag-checkered', color: d.meeting.meetIconColor || '', label:t('meeting.label.place'),    value:d.meeting.place,    sub:d.meeting.placeDetail},
  {icon: d.meeting.dateIcon || 'fa-solid fa-clock',          color: d.meeting.dateIconColor || '', label:t('meeting.label.date'),     value:d.meeting.date,     sub:d.meeting.time},
  {icon: d.meeting.endIcon  || 'fa-solid fa-circle-check',   color: d.meeting.endIconColor  || '', label:t('meeting.label.endPlace'), value:d.meeting.endPlace, sub:d.meeting.endTime}
];
document.getElementById('meetingCards').innerHTML = mc.map(c=>`
<div class="info-card">
  <div class="info-card-icon"${c.color ? ` style="background:${esc(c.color)}"` : ''}><i class="${c.icon}"></i></div>
  <div class="info-card-body">
    <div class="label">${c.label}</div>
    <div class="value">${c.value}</div>
    <div class="sub">${c.sub}</div>
  </div>
</div>`).join('');

// Meeting maps（集合・解散が同じURLの場合は1枚だけ表示）
(function(){
  const maps = [];
  const meetUrl = d.meeting.meetMapUrl;
  const endUrl  = d.meeting.endMapUrl;
  if (meetUrl && endUrl && meetUrl === endUrl) {
    // 集合・解散が同じ場所 → マップ1枚
    maps.push({
      icon:  d.meeting.meetIcon || 'fa-solid fa-flag-checkered',
      label: t('map.label.meetEnd') + ' &nbsp;' + d.meeting.place,
      url:   meetUrl
    });
  } else {
    if (meetUrl) maps.push({
      icon:  d.meeting.meetIcon || 'fa-solid fa-flag-checkered',
      label: t('map.label.meet') + ' &nbsp;' + d.meeting.place,
      url:   meetUrl
    });
    if (endUrl) maps.push({
      icon:  d.meeting.endIcon || 'fa-solid fa-circle-check',
      label: t('map.label.end') + ' &nbsp;' + d.meeting.endPlace,
      url:   endUrl
    });
  }
  document.getElementById('meetingMaps').innerHTML = maps.map(m => `
    <div class="meeting-map-block">
      <div class="meeting-map-label"><i class="${m.icon}"></i>${m.label}</div>
      <div class="meeting-map-frame">
        <iframe src="${m.url}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>`).join('');
})();

// Shuttle info
(function(){
  const sh = d.meeting.shuttle || {};
  if (!sh.enabled) return;
  const pickupsHtml = (sh.pickups || []).map(p => `
    <div class="shuttle-pickup-item" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div class="shuttle-pickup-icon"><i class="fa-solid fa-bus"></i></div>
        <div class="shuttle-pickup-body" style="flex:1">
          <div class="shuttle-pickup-place"><i class="fa-solid fa-location-dot" style="color:#B86A00;margin-right:4px"></i>${esc(p.place)}</div>
          ${p.time ? `<div class="shuttle-pickup-time"><i class="fa-solid fa-clock" style="margin-right:4px"></i>${esc(p.time)}</div>` : ''}
          ${p.note ? `<div class="shuttle-pickup-note">${esc(p.note)}</div>` : ''}
        </div>
      </div>
      ${p.mapUrl ? `<div class="shuttle-pickup-map"><iframe src="${esc(p.mapUrl)}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>` : ''}
    </div>`).join('');
  const metaHtml = [
    sh.deadline ? `<div class="shuttle-meta-item"><i class="fa-solid fa-calendar-check"></i>${esc(t('shuttle.deadline'))}${esc(sh.deadline)}</div>` : '',
    sh.contact  ? `<div class="shuttle-meta-item"><i class="fa-solid fa-phone"></i>${esc(sh.contact)}</div>` : ''
  ].join('');
  document.getElementById('shuttleBlock').innerHTML = `
    <div class="shuttle-block">
      <div class="shuttle-header"><i class="fa-solid fa-van-shuttle"></i>${esc(t('shuttle.header'))}</div>
      <div style="background:#FFF8EC;border:1px solid #F5C97A;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:.88rem;color:#7A4500;display:flex;align-items:center;gap:8px">
        <i class="fa-solid fa-flag" style="color:#9e1016;flex-shrink:0"></i>
        ${esc(t('shuttle.staffNote'))}
      </div>
      ${sh.note ? `<div class="shuttle-note">${esc(sh.note)}</div>` : ''}
      ${pickupsHtml ? `<div class="shuttle-pickup-list">${pickupsHtml}</div>` : ''}
      ${metaHtml   ? `<div class="shuttle-meta">${metaHtml}</div>` : ''}
    </div>`;
})();

// Includes / Excludes
function renderList(el, items, icon, cls){
  el.innerHTML = items.map(i=>`<div class="include-item"><i class="${icon}"></i><span>${i}</span></div>`).join('');
}
renderList(document.getElementById('includesList'), d.includes, 'fa-solid fa-check', 'yes');
renderList(document.getElementById('excludesList'), d.excludes, 'fa-solid fa-xmark', 'no');

// Quick links
document.getElementById('quickLinksGrid').innerHTML = (d.quickLinks || []).map(q => `
  <a href="${q.url}" class="quick-link-card">
    <div class="quick-link-img" style="background:linear-gradient(135deg,${q.color1},${q.color2})"><i class="${q.icon}"></i></div>
    <div class="quick-link-body"><h3>${q.title}</h3><p>${q.desc}</p></div>
  </a>`).join('');

// FAQ
const faqs = d.faq || [];
if (faqs.length) {
  document.getElementById('faqSection').style.display = '';
  document.getElementById('faqList').innerHTML = faqs.map(item => `
    <div style="background:#fff;border:1px solid #E8E2D8;border-radius:12px;padding:18px 20px;margin-bottom:12px">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
        <i class="fa-solid fa-circle-question" style="color:#9e1016;font-size:1.1rem;flex-shrink:0;margin-top:2px"></i>
        <span style="font-weight:700;color:#1A1A2E;font-size:.96rem;line-height:1.6">${esc(item.q)}</span>
      </div>
      <div style="display:flex;align-items:flex-start;gap:10px;padding-left:2px">
        <i class="fa-solid fa-comment-dots" style="color:#5A5650;font-size:1rem;flex-shrink:0;margin-top:3px;margin-left:2px"></i>
        <span style="color:#5A5650;font-size:.92rem;line-height:1.7;white-space:pre-line">${esc(item.a)}</span>
      </div>
    </div>`).join('');
}

// Footer
document.getElementById('footerCompany').textContent = d.company.name;
document.getElementById('footerCopy').innerHTML = '&copy; 2026 ' + d.company.nameEn + '. All Rights Reserved.';
// Hamburger
document.getElementById('hamburger').addEventListener('click',function(){
  this.classList.toggle('open');
  document.getElementById('mobileNav').classList.toggle('open');
});
</script>
</body>
</html>
