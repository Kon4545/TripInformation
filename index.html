<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pageTitle">旅のしおり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo"><i class="fa-solid fa-paper-plane"></i><span id="hCompanyName">MOTO TOURS JAPAN</span></a>
    <nav class="nav-menu">
      <a href="index.html" class="active">ホーム</a>
      <a href="route.html">全体行程</a>
      <a href="itinerary_day1.html">Day 1</a>
      <a href="itinerary_day2.html">Day 2</a>
      <a href="itinerary_day3.html">Day 3</a>
      <a href="caution.html">注意事項</a>
      <a href="company_information.html">会社情報</a>
      <a href="post_tour.html">ツアー後</a>
    </nav>
    <img src="MTJ_logo_color_CMYK.jpg" alt="MOTO TOURS JAPAN" class="header-logo-img">
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <nav class="mobile-nav" id="mobileNav">
    <a href="index.html" class="active"><i class="fa-solid fa-house"></i>&ensp;ホーム</a>
    <a href="route.html"><i class="fa-solid fa-map"></i>&ensp;全体行程</a>
    <a href="itinerary_day1.html"><i class="fa-solid fa-calendar-day"></i>&ensp;Day 1 詳細</a>
    <a href="itinerary_day2.html"><i class="fa-solid fa-calendar-day"></i>&ensp;Day 2 詳細</a>
    <a href="itinerary_day3.html"><i class="fa-solid fa-calendar-day"></i>&ensp;Day 3 詳細</a>
    <a href="caution.html"><i class="fa-solid fa-circle-exclamation"></i>&ensp;注意事項</a>
    <a href="company_information.html"><i class="fa-solid fa-building"></i>&ensp;会社情報</a>
    <a href="post_tour.html"><i class="fa-solid fa-camera-retro"></i>&ensp;ツアー後</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero" id="heroSection">
  <div class="hero-eyebrow"><i class="fa-solid fa-paper-plane"></i> 旅のしおり</div>
  <h1 id="heroTitle">—</h1>
  <p class="hero-sub" id="heroSub">—</p>
  <div class="hero-chips" id="heroChips"></div>
</section>

<main>
<div class="container">

  <!-- Greeting（最初に表示） -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-envelope-open-text"></i> 担当添乗員からのご挨拶</h2>
    <div class="greeting-box" id="greetingBox"></div>
  </section>

  <!-- Meeting info -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-clock"></i> 集合・解散情報</h2>
    <!-- マップを最初に表示 -->
    <div class="meeting-maps" id="meetingMaps"></div>
    <!-- 集合・解散カード -->
    <div class="grid grid-3" id="meetingCards"></div>
    <!-- 送迎 -->
    <div id="shuttleBlock"></div>
  </section>

  <!-- Includes / Excludes -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-list-check"></i> 含まれるもの・含まれないもの</h2>
    <div class="include-grid">
      <div class="include-box yes">
        <div class="include-box-header"><i class="fa-solid fa-circle-check"></i> 含まれるもの</div>
        <div id="includesList"></div>
      </div>
      <div class="include-box no">
        <div class="include-box-header"><i class="fa-solid fa-circle-xmark"></i> 含まれないもの</div>
        <div id="excludesList"></div>
      </div>
    </div>
  </section>

  <!-- Quick links -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-compass"></i> しおりのコンテンツ</h2>
    <div class="grid grid-3" id="quickLinksGrid"></div>
  </section>

  <!-- FAQ -->
  <section class="section" id="faqSection" style="display:none">
    <h2 class="section-title"><i class="fa-solid fa-circle-question"></i> よくある質問</h2>
    <div id="faqList"></div>
  </section>

</div>
</main>

<footer class="site-footer">
  <p><i class="fa-solid fa-paper-plane"></i>&ensp;<span id="footerCompany">MOTO TOURS JAPAN株式会社</span></p>
  <p id="footerCopy">&copy; 2026 MOTO TOURS JAPAN Co., Ltd. All Rights Reserved.</p>
</footer>

<script src="tour-data.js"></script>
<script>
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
const d = getData();
// Page title
document.getElementById('pageTitle').textContent = '旅のしおり | ' + d.basic.tourTitle;
document.getElementById('hCompanyName').textContent = d.company.name.toUpperCase() || 'MOTO TOURS JAPAN株式会社';
// Hero
document.getElementById('heroTitle').innerHTML = d.basic.tourTitle.replace('・','<span style="color:var(--white)">・</span>');
// Hero background image
if (d.basic.heroBgImage) {
  const hero = document.getElementById('heroSection');
  hero.style.background = [
    'linear-gradient(160deg, rgba(100,0,0,.78) 0%, rgba(136,0,0,.68) 50%, rgba(100,0,0,.75) 100%)',
    'url("' + d.basic.heroBgImage + '") center/cover no-repeat'
  ].join(', ');
  hero.classList.add('has-bg-img');
}
document.getElementById('heroSub').textContent = d.basic.tourSubtitle;
document.getElementById('heroChips').innerHTML = [
  ['fa-solid fa-calendar', d.basic.tourDates],
  ['fa-solid fa-users', d.basic.participantCount],
  ['fa-solid fa-location-dot', d.basic.area]
].map(([ico,txt])=>`<span class="hero-chip"><i class="${ico}"></i>${txt}</span>`).join('');

// 担当添乗員からのご挨拶（複数担当者対応）
const guides = (d.guides && d.guides.length) ? d.guides : (d.guide ? [d.guide] : []);
const primaryGuide = guides[0] || {};
document.getElementById('greetingBox').innerHTML =
  '<div class="greeting-from">' +
  guides.map(g => `
    <div class="greeting-from-item">
      <div class="greeting-avatar"><i class="fa-solid fa-circle-user"></i></div>
      <div>
        <div class="greeting-from-name">${esc(g.name)}</div>
        <div class="greeting-from-title">${esc(g.title)}</div>
      </div>
    </div>`).join('') +
  '</div>' +
  `<div class="greeting-text">${esc(primaryGuide.greeting || '')}</div>` +
  `<div class="greeting-sign">${esc(d.company.name)}　担当 ${guides.map(g => g.name.split('（')[0]).join(' / ')}</div>`;

// Meeting cards
const mc = [
  {icon: d.meeting.meetIcon || 'fa-solid fa-flag-checkered', color: d.meeting.meetIconColor || '', label:'集合場所',      value:d.meeting.place,    sub:d.meeting.placeDetail},
  {icon: d.meeting.dateIcon || 'fa-solid fa-clock',          color: d.meeting.dateIconColor || '', label:'集合日時',      value:d.meeting.date,     sub:d.meeting.time},
  {icon: d.meeting.endIcon  || 'fa-solid fa-circle-check',   color: d.meeting.endIconColor  || '', label:'ツアー終了場所', value:d.meeting.endPlace, sub:d.meeting.endTime}
];
document.getElementById('meetingCards').innerHTML = mc.map(c=>`
<div class="info-card">
  <div class="info-card-icon"${c.color ? ` style="background:${esc(c.color)}"` : ''}><i class="${c.icon}"></i></div>
  <div class="info-card-body">
    <div class="label">${c.label}</div>
    <div class="value">${c.value}</div>
    <div class="sub">${c.sub}</div>
  </div>
</div>`).join('');

// Meeting maps（集合・解散が同じURLの場合は1枚だけ表示）
(function(){
  const maps = [];
  const meetUrl = d.meeting.meetMapUrl;
  const endUrl  = d.meeting.endMapUrl;
  if (meetUrl && endUrl && meetUrl === endUrl) {
    // 集合・解散が同じ場所 → マップ1枚
    maps.push({
      icon:  d.meeting.meetIcon || 'fa-solid fa-flag-checkered',
      label: '集合・解散場所マップ &nbsp;' + d.meeting.place,
      url:   meetUrl
    });
  } else {
    if (meetUrl) maps.push({
      icon:  d.meeting.meetIcon || 'fa-solid fa-flag-checkered',
      label: '集合場所マップ &nbsp;' + d.meeting.place,
      url:   meetUrl
    });
    if (endUrl) maps.push({
      icon:  d.meeting.endIcon || 'fa-solid fa-circle-check',
      label: '解散場所マップ &nbsp;' + d.meeting.endPlace,
      url:   endUrl
    });
  }
  document.getElementById('meetingMaps').innerHTML = maps.map(m => `
    <div class="meeting-map-block">
      <div class="meeting-map-label"><i class="${m.icon}"></i>${m.label}</div>
      <div class="meeting-map-frame">
        <iframe src="${m.url}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>`).join('');
})();

// Shuttle info
(function(){
  const sh = d.meeting.shuttle || {};
  if (!sh.enabled) return;
  const pickupsHtml = (sh.pickups || []).map(p => `
    <div class="shuttle-pickup-item" style="flex-direction:column;align-items:stretch">
      <div style="display:flex;align-items:flex-start;gap:12px">
        <div class="shuttle-pickup-icon"><i class="fa-solid fa-bus"></i></div>
        <div class="shuttle-pickup-body" style="flex:1">
          <div class="shuttle-pickup-place"><i class="fa-solid fa-location-dot" style="color:#B86A00;margin-right:4px"></i>${esc(p.place)}</div>
          ${p.time ? `<div class="shuttle-pickup-time"><i class="fa-solid fa-clock" style="margin-right:4px"></i>${esc(p.time)}</div>` : ''}
          ${p.note ? `<div class="shuttle-pickup-note">${esc(p.note)}</div>` : ''}
        </div>
      </div>
      ${p.mapUrl ? `<div class="shuttle-pickup-map"><iframe src="${esc(p.mapUrl)}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe></div>` : ''}
    </div>`).join('');
  const metaHtml = [
    sh.deadline ? `<div class="shuttle-meta-item"><i class="fa-solid fa-calendar-check"></i>申込締切：${esc(sh.deadline)}</div>` : '',
    sh.contact  ? `<div class="shuttle-meta-item"><i class="fa-solid fa-phone"></i>${esc(sh.contact)}</div>` : ''
  ].join('');
  document.getElementById('shuttleBlock').innerHTML = `
    <div class="shuttle-block">
      <div class="shuttle-header"><i class="fa-solid fa-van-shuttle"></i>送迎をご希望の方へ</div>
      <div style="background:#FFF8EC;border:1px solid #F5C97A;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:.88rem;color:#7A4500;display:flex;align-items:center;gap:8px">
        <i class="fa-solid fa-flag" style="color:#9e1016;flex-shrink:0"></i>
        集合場所にはMOTO TOURS JAPANのロゴを持ったスタッフがお待ちしております。
      </div>
      ${sh.note ? `<div class="shuttle-note">${esc(sh.note)}</div>` : ''}
      ${pickupsHtml ? `<div class="shuttle-pickup-list">${pickupsHtml}</div>` : ''}
      ${metaHtml   ? `<div class="shuttle-meta">${metaHtml}</div>` : ''}
    </div>`;
})();

// Includes / Excludes
function renderList(el, items, icon, cls){
  el.innerHTML = items.map(i=>`<div class="include-item"><i class="${icon}"></i><span>${i}</span></div>`).join('');
}
renderList(document.getElementById('includesList'), d.includes, 'fa-solid fa-check', 'yes');
renderList(document.getElementById('excludesList'), d.excludes, 'fa-solid fa-xmark', 'no');

// Quick links
document.getElementById('quickLinksGrid').innerHTML = (d.quickLinks || []).map(q => `
  <a href="${q.url}" class="quick-link-card">
    <div class="quick-link-img" style="background:linear-gradient(135deg,${q.color1},${q.color2})"><i class="${q.icon}"></i></div>
    <div class="quick-link-body"><h3>${q.title}</h3><p>${q.desc}</p></div>
  </a>`).join('');

// FAQ
const faqs = d.faq || [];
if (faqs.length) {
  document.getElementById('faqSection').style.display = '';
  document.getElementById('faqList').innerHTML = faqs.map(item => `
    <div style="background:#fff;border:1px solid #E8E2D8;border-radius:12px;padding:18px 20px;margin-bottom:12px">
      <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:10px">
        <i class="fa-solid fa-circle-question" style="color:#9e1016;font-size:1.1rem;flex-shrink:0;margin-top:2px"></i>
        <span style="font-weight:700;color:#1A1A2E;font-size:.96rem;line-height:1.6">${esc(item.q)}</span>
      </div>
      <div style="display:flex;align-items:flex-start;gap:10px;padding-left:2px">
        <i class="fa-solid fa-comment-dots" style="color:#5A5650;font-size:1rem;flex-shrink:0;margin-top:3px;margin-left:2px"></i>
        <span style="color:#5A5650;font-size:.92rem;line-height:1.7;white-space:pre-line">${esc(item.a)}</span>
      </div>
    </div>`).join('');
}

// Footer
document.getElementById('footerCompany').textContent = d.company.name;
document.getElementById('footerCopy').innerHTML = '&copy; 2026 ' + d.company.nameEn + '. All Rights Reserved.';
// Hamburger
document.getElementById('hamburger').addEventListener('click',function(){
  this.classList.toggle('open');
  document.getElementById('mobileNav').classList.toggle('open');
});
</script>
</body>
</html>
