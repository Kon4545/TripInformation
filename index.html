<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title id="pageTitle">旅のしおり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="site-logo"><i class="fa-solid fa-paper-plane"></i><span id="hCompanyName">Moto Tours Japan</span></a>
    <nav class="nav-menu">
      <a href="index.html" class="active">ホーム</a>
      <a href="route.html">全体行程</a>
      <a href="itinerary_day1.html">Day 1</a>
      <a href="itinerary_day2.html">Day 2</a>
      <a href="itinerary_day3.html">Day 3</a>
      <a href="caution.html">注意事項</a>
      <a href="company_information.html">会社情報</a>
    </nav>
    <img src="MTJ_logo_color_CMYK.jpg" alt="Moto Tours Japan" class="header-logo-img">
    <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
  </div>
  <nav class="mobile-nav" id="mobileNav">
    <a href="index.html" class="active"><i class="fa-solid fa-house"></i>&ensp;ホーム</a>
    <a href="route.html"><i class="fa-solid fa-map"></i>&ensp;全体行程</a>
    <a href="itinerary_day1.html"><i class="fa-solid fa-calendar-day"></i>&ensp;Day 1 詳細</a>
    <a href="itinerary_day2.html"><i class="fa-solid fa-calendar-day"></i>&ensp;Day 2 詳細</a>
    <a href="itinerary_day3.html"><i class="fa-solid fa-calendar-day"></i>&ensp;Day 3 詳細</a>
    <a href="caution.html"><i class="fa-solid fa-circle-exclamation"></i>&ensp;注意事項</a>
    <a href="company_information.html"><i class="fa-solid fa-building"></i>&ensp;会社情報</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero" id="heroSection">
  <div class="hero-eyebrow"><i class="fa-solid fa-paper-plane"></i> 旅のしおり</div>
  <h1 id="heroTitle">—</h1>
  <p class="hero-sub" id="heroSub">—</p>
  <div class="hero-chips" id="heroChips"></div>
</section>

<main>
<div class="container">

  <section class="section">
    <!-- Customer banner -->
    <div class="customer-banner" id="customerBanner">
      <i class="fa-solid fa-user-tie"></i>
      <div><div class="label">ご参加のお客様</div><div class="name" id="customerName">—</div></div>
    </div>

    <!-- Meeting info -->
    <h2 class="section-title"><i class="fa-solid fa-clock"></i> 集合・解散情報</h2>
    <div class="grid grid-3" id="meetingCards"></div>
    <div class="meeting-maps" id="meetingMaps"></div>
  </section>

  <!-- Greeting -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-envelope-open-text"></i> 添乗員からのご挨拶</h2>
    <div class="greeting-box">
      <div class="greeting-from">
        <div class="greeting-avatar"><i class="fa-solid fa-circle-user"></i></div>
        <div>
          <div class="greeting-from-name" id="guideName">—</div>
          <div class="greeting-from-title" id="guideTitle">—</div>
        </div>
      </div>
      <div class="greeting-text" id="greetingText">—</div>
      <div class="greeting-sign" id="greetingSign">—</div>
    </div>
  </section>

  <!-- Includes / Excludes -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-list-check"></i> 含まれるもの・含まれないもの</h2>
    <div class="include-grid">
      <div class="include-box yes">
        <div class="include-box-header"><i class="fa-solid fa-circle-check"></i> 含まれるもの</div>
        <div id="includesList"></div>
      </div>
      <div class="include-box no">
        <div class="include-box-header"><i class="fa-solid fa-circle-xmark"></i> 含まれないもの</div>
        <div id="excludesList"></div>
      </div>
    </div>
  </section>

  <!-- Quick links -->
  <section class="section">
    <h2 class="section-title"><i class="fa-solid fa-compass"></i> しおりのコンテンツ</h2>
    <div class="grid grid-3" id="quickLinksGrid"></div>
  </section>

</div>
</main>

<footer class="site-footer">
  <p><i class="fa-solid fa-paper-plane"></i>&ensp;<span id="footerCompany">Moto Tours Japan株式会社</span></p>
  <p id="footerCopy">&copy; 2026 Moto Tours Japan Co., Ltd. All Rights Reserved.</p>
</footer>

<script src="tour-data.js"></script>
<script>
const d = getData();
// Page title
document.getElementById('pageTitle').textContent = '旅のしおり | ' + d.basic.tourTitle;
document.getElementById('hCompanyName').textContent = d.company.name.replace('株式会社','').trim() || 'Moto Tours Japan';
// Hero
document.getElementById('heroTitle').innerHTML = d.basic.tourTitle.replace('・','<span style="color:var(--white)">・</span>');
document.getElementById('heroSub').textContent = d.basic.tourSubtitle;
document.getElementById('heroChips').innerHTML = [
  ['fa-solid fa-calendar', d.basic.tourDates],
  ['fa-solid fa-users', d.basic.participantCount],
  ['fa-solid fa-location-dot', d.basic.area]
].map(([ico,txt])=>`<span class="hero-chip"><i class="${ico}"></i>${txt}</span>`).join('');
// Customer（URLパラメーター ?name= があればそちらを優先）
const _urlName = new URLSearchParams(window.location.search).get('name');
const _customerName = _urlName ? _urlName : d.basic.customerName;
document.getElementById('customerName').textContent = _customerName + ' 様';
// Meeting cards
const mc = [
  {icon:'fa-solid fa-flag-checkered', label:'集合場所', value:d.meeting.place, sub:d.meeting.placeDetail},
  {icon:'fa-solid fa-clock',          label:'集合日時', value:d.meeting.date, sub:d.meeting.time},
  {icon:'fa-solid fa-circle-check',   label:'ツアー終了場所', value:d.meeting.endPlace, sub:d.meeting.endTime}
];
document.getElementById('meetingCards').innerHTML = mc.map(c=>`
<div class="info-card">
  <div class="info-card-icon"><i class="${c.icon}"></i></div>
  <div class="info-card-body">
    <div class="label">${c.label}</div>
    <div class="value">${c.value}</div>
    <div class="sub">${c.sub}</div>
  </div>
</div>`).join('');
// Meeting maps（URLが設定されている場合のみ表示）
(function(){
  const maps = [];
  if (d.meeting.meetMapUrl) maps.push({
    icon: 'fa-solid fa-flag-checkered',
    label: '集合場所マップ &nbsp;' + d.meeting.place,
    url: d.meeting.meetMapUrl
  });
  if (d.meeting.endMapUrl) maps.push({
    icon: 'fa-solid fa-circle-check',
    label: '解散場所マップ &nbsp;' + d.meeting.endPlace,
    url: d.meeting.endMapUrl
  });
  document.getElementById('meetingMaps').innerHTML = maps.map(m => `
    <div class="meeting-map-block">
      <div class="meeting-map-label"><i class="${m.icon}"></i>${m.label}</div>
      <div class="meeting-map-frame">
        <iframe src="${m.url}" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>`).join('');
})();
// Guide greeting
document.getElementById('guideName').textContent    = d.guide.name;
document.getElementById('guideTitle').textContent   = d.guide.title;
document.getElementById('greetingText').textContent = d.guide.greeting;
document.getElementById('greetingSign').textContent = d.company.name + '　添乗員 ' + d.guide.name.split('（')[0];
// Includes / Excludes
function renderList(el, items, icon, cls){
  el.innerHTML = items.map(i=>`<div class="include-item"><i class="${icon}"></i><span>${i}</span></div>`).join('');
}
renderList(document.getElementById('includesList'), d.includes, 'fa-solid fa-check', 'yes');
renderList(document.getElementById('excludesList'), d.excludes, 'fa-solid fa-xmark', 'no');
// Quick links
document.getElementById('quickLinksGrid').innerHTML = (d.quickLinks || []).map(q => `
  <a href="${q.url}" class="quick-link-card">
    <div class="quick-link-img" style="background:linear-gradient(135deg,${q.color1},${q.color2})"><i class="${q.icon}"></i></div>
    <div class="quick-link-body"><h3>${q.title}</h3><p>${q.desc}</p></div>
  </a>`).join('');
// Footer
document.getElementById('footerCompany').textContent = d.company.name;
document.getElementById('footerCopy').innerHTML = '&copy; 2026 ' + d.company.nameEn + '. All Rights Reserved.';
// Hamburger
document.getElementById('hamburger').addEventListener('click',function(){
  this.classList.toggle('open');
  document.getElementById('mobileNav').classList.toggle('open');
});
</script>
</body>
</html>
