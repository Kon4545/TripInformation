<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>フリップブック | 旅のしおり</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#9e1016">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; overflow: hidden;
    font-family: 'Noto Sans JP', sans-serif;
    background: radial-gradient(ellipse at center, #2C3E6B 0%, #1A1A2E 70%, #0E0E1A 100%);
  }

  .fb-topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 500;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 18px;
    background: rgba(10,10,20,.55);
    backdrop-filter: blur(6px);
  }
  .fb-topbar a {
    color: #F5C97A; text-decoration: none; font-size: .85rem; font-weight: 700;
    display: flex; align-items: center; gap: 6px;
  }
  .fb-topbar .fb-title {
    color: #fff; font-size: .88rem; font-weight: 700; letter-spacing: .03em;
    display: flex; align-items: center; gap: 8px; opacity: .9;
  }

  .fb-stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 64px 70px 76px;
    perspective: 2200px;
  }

  .fb-book {
    position: relative;
    width: min(94vw, 880px);
    height: min(82vh, 1180px);
  }

  .fb-page {
    position: absolute; inset: 0;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 18px 50px rgba(0,0,0,.45), 0 2px 8px rgba(0,0,0,.25);
    backface-visibility: hidden;
    transform-style: preserve-3d;
    transform: rotateY(0deg);
    transition: transform .68s cubic-bezier(.45,.05,.55,.95), box-shadow .68s;
    will-change: transform;
  }
  .fb-page iframe {
    width: 100%; height: 100%; border: 0; display: block; background: #fff;
  }
  .fb-page::after {
    content: '';
    position: absolute; inset: 0;
    pointer-events: none;
    opacity: 0;
    transition: opacity .68s;
  }
  .fb-page.turning-next { transform-origin: left center; transform: rotateY(-155deg); box-shadow: -40px 14px 60px rgba(0,0,0,.55); }
  .fb-page.turning-next::after { opacity: 1; background: linear-gradient(to right, rgba(0,0,0,0) 70%, rgba(0,0,0,.35) 100%); }
  .fb-page.turning-prev { transform-origin: right center; transform: rotateY(155deg); box-shadow: 40px 14px 60px rgba(0,0,0,.55); }
  .fb-page.turning-prev::after { opacity: 1; background: linear-gradient(to left, rgba(0,0,0,0) 70%, rgba(0,0,0,.35) 100%); }
  .fb-page.fb-instant { transition: none; }

  .fb-nav-btn {
    position: fixed; top: 50%; transform: translateY(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.25);
    color: #fff; font-size: 1.15rem; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    z-index: 400; transition: background .2s, opacity .2s, transform .2s;
    backdrop-filter: blur(4px);
  }
  .fb-nav-btn:hover { background: rgba(255,255,255,.22); }
  .fb-nav-btn:active { transform: translateY(-50%) scale(.92); }
  .fb-nav-btn:disabled { opacity: .25; cursor: default; pointer-events: none; }
  .fb-prev-btn { left: 14px; }
  .fb-next-btn { right: 14px; }

  .fb-footer {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 400;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    padding: 12px 14px 16px;
    background: linear-gradient(to top, rgba(10,10,20,.6), rgba(10,10,20,0));
  }
  .fb-pagenum {
    color: #fff; font-size: .85rem; font-weight: 700; letter-spacing: .04em;
    background: rgba(255,255,255,.12); padding: 5px 16px; border-radius: 99px;
  }
  .fb-pagenum .fb-pagelabel { color: #F5C97A; margin-left: 8px; font-weight: 500; }
  .fb-dots { display: flex; gap: 7px; }
  .fb-dot {
    width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.3);
    cursor: pointer; transition: background .2s, transform .2s; border: none; padding: 0;
  }
  .fb-dot.active { background: #F5C97A; transform: scale(1.25); }

  .fb-hint {
    position: fixed; bottom: 64px; left: 0; right: 0; text-align: center;
    color: rgba(255,255,255,.55); font-size: .74rem; z-index: 390;
    pointer-events: none; transition: opacity .4s;
  }

  @media (max-width: 760px) {
    .fb-stage { padding: 52px 8px 70px; perspective: 1500px; }
    .fb-book { width: 100vw; height: calc(100dvh - 122px); }
    .fb-page { border-radius: 0; }
    .fb-nav-btn { width: 42px; height: 42px; font-size: 1rem; }
    .fb-prev-btn { left: 6px; }
    .fb-next-btn { right: 6px; }
    .fb-topbar .fb-title span.fb-title-text { display: none; }
    .fb-hint { display: none; }
    .fb-topbar .lang-switcher { gap: 3px; }
    .fb-topbar .lang-switch-btn { font-size: .62rem; padding: 4px 7px; }
  }
</style>
</head>
<body>

<div class="fb-topbar">
  <a href="index.html"><i class="fa-solid fa-arrow-left"></i> <span data-i18n="fb.backToNormal">通常表示に戻る</span></a>
  <div class="fb-title"><i class="fa-solid fa-book-open"></i><span class="fb-title-text" data-i18n="fb.title">旅のしおり フリップブック</span></div>
  <div id="langSwitcherFb"></div>
</div>

<div class="fb-stage">
  <div class="fb-book" id="fbBook"></div>
</div>

<button class="fb-nav-btn fb-prev-btn" id="fbPrevBtn" aria-label="前のページ"><i class="fa-solid fa-chevron-left"></i></button>
<button class="fb-nav-btn fb-next-btn" id="fbNextBtn" aria-label="次のページ"><i class="fa-solid fa-chevron-right"></i></button>

<div class="fb-hint" data-i18n="fb.hint">← → キーまたはスワイプでページをめくれます</div>

<div class="fb-footer">
  <div class="fb-dots" id="fbDots"></div>
  <div class="fb-pagenum" id="fbPageNum">1 / 1</div>
</div>

<script src="pwa.js"></script>
<script src="i18n.js"></script>
<script>
applyI18nStaticText();
mountLangSwitcher('langSwitcherFb');
document.title = t('fb.title');

const PAGES = [
  { title: t('nav.home'),     file: 'index.html' },
  { title: t('nav.route'),    file: 'route.html' },
  { title: t('nav.caution'),  file: 'caution.html' },
  { title: t('nav.company'),  file: 'company_information.html' },
  { title: t('nav.postTour'), file: 'post_tour.html' }
];

let current = 0;
let isAnimating = false;
const ANIM_MS = 680;

function pageEl(i){ return document.querySelector('.fb-page[data-index="'+i+'"]'); }
function iframeEl(i){ const p = pageEl(i); return p ? p.querySelector('iframe') : null; }

function buildBook(){
  const book = document.getElementById('fbBook');
  book.innerHTML = PAGES.map((p, i) =>
    '<div class="fb-page" data-index="' + i + '" style="z-index:' + (PAGES.length - i) + '">' +
      '<iframe data-src="' + p.file + '" title="' + p.title + '"></iframe>' +
    '</div>'
  ).join('');

  const dots = document.getElementById('fbDots');
  dots.innerHTML = PAGES.map((p, i) =>
    '<button class="fb-dot' + (i === 0 ? ' active' : '') + '" data-goto="' + i + '" aria-label="' + p.title + '"></button>'
  ).join('');
  dots.querySelectorAll('.fb-dot').forEach(btn => {
    btn.addEventListener('click', () => goTo(parseInt(btn.dataset.goto, 10)));
  });

  loadPage(0);
  loadPage(1);
  updateView();
}

function loadPage(i){
  const ifr = iframeEl(i);
  if (!ifr || ifr.src) return;
  ifr.src = ifr.dataset.src;
  ifr.addEventListener('load', () => attachFrameHandlers(ifr), { once: true });
}

function attachFrameHandlers(ifr){
  try {
    const doc = ifr.contentDocument;
    if (!doc) return;
    doc.addEventListener('keydown', onKey);

    let sx = 0, sy = 0, tracking = false;
    doc.addEventListener('touchstart', e => {
      if (!e.touches.length) return;
      sx = e.touches[0].clientX; sy = e.touches[0].clientY; tracking = true;
    }, { passive: true });
    doc.addEventListener('touchend', e => {
      if (!tracking) return;
      tracking = false;
      if (!e.changedTouches.length) return;
      handleSwipe(sx, sy, e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }, { passive: true });
  } catch (e) { /* same-origin expected; ignore failures silently */ }
}

function onKey(e){
  const tag = (e.target && e.target.tagName) || '';
  if (['INPUT','TEXTAREA','SELECT'].includes(tag) || (e.target && e.target.isContentEditable)) return;
  if (e.key === 'ArrowRight') { e.preventDefault(); goNext(); }
  else if (e.key === 'ArrowLeft') { e.preventDefault(); goPrev(); }
}
document.addEventListener('keydown', onKey);

let stageSX = 0, stageSY = 0, stageTracking = false;
const stage = document.querySelector('.fb-stage');
stage.addEventListener('touchstart', e => {
  if (!e.touches.length) return;
  stageSX = e.touches[0].clientX; stageSY = e.touches[0].clientY; stageTracking = true;
}, { passive: true });
stage.addEventListener('touchend', e => {
  if (!stageTracking) return;
  stageTracking = false;
  if (!e.changedTouches.length) return;
  handleSwipe(stageSX, stageSY, e.changedTouches[0].clientX, e.changedTouches[0].clientY);
}, { passive: true });

function handleSwipe(x1, y1, x2, y2){
  const dx = x2 - x1, dy = y2 - y1;
  if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.4) {
    if (dx < 0) goNext(); else goPrev();
  }
}

function goNext(){ goTo(current + 1); }
function goPrev(){ goTo(current - 1); }

function goTo(target){
  if (isAnimating || target === current || target < 0 || target >= PAGES.length) return;
  isAnimating = true;

  const dir = target > current ? 'next' : 'prev';
  loadPage(target);
  loadPage(dir === 'next' ? target + 1 : target - 1);

  if (dir === 'next') {
    const fromEl = pageEl(current);
    fromEl.classList.add('turning-next');
  } else {
    const toEl = pageEl(target);
    toEl.classList.add('fb-instant');
    toEl.style.display = '';
    toEl.style.transform = 'rotateY(155deg)';
    // 強制リフロー後にトランジションを有効化して戻す
    void toEl.offsetWidth;
    toEl.classList.remove('fb-instant');
    toEl.classList.remove('turning-prev');
    requestAnimationFrame(() => { toEl.style.transform = ''; });
  }

  setTimeout(() => {
    if (dir === 'next') {
      const fromEl = pageEl(current);
      fromEl.classList.remove('turning-next');
      fromEl.style.display = 'none';
    }
    current = target;
    isAnimating = false;
    updateView();
  }, ANIM_MS);
}

function updateView(){
  PAGES.forEach((p, i) => {
    const el = pageEl(i);
    if (i < current) {
      el.style.display = 'none';
    } else {
      el.style.display = '';
    }
  });
  document.getElementById('fbPrevBtn').disabled = (current === 0);
  document.getElementById('fbNextBtn').disabled = (current === PAGES.length - 1);
  document.getElementById('fbPageNum').textContent = (current + 1) + ' / ' + PAGES.length;
  document.querySelectorAll('.fb-dot').forEach((dot, i) => dot.classList.toggle('active', i === current));
}

document.getElementById('fbPrevBtn').addEventListener('click', goPrev);
document.getElementById('fbNextBtn').addEventListener('click', goNext);

buildBook();
</script>
</body>
</html>
